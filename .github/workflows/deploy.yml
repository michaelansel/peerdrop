name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

      - name: Verify ?broker= override stripped from prod bundle
        run: |
          # Fail closed if the build produced no bundle to inspect.
          if [ ! -d dist/assets ] || [ -z "$(find dist/assets -name '*.js' -print -quit)" ]; then
            echo "ERROR: no JS bundle found under dist/assets"
            exit 1
          fi
          # The dev-only ?broker= parser is the sole user of URLSearchParams; Vite's
          # `define` + dead-code elimination must remove it from the production bundle.
          # Scan the whole dist tree (JS plus any inlined HTML); a match fails the build.
          if grep -rl "URLSearchParams" dist; then
            echo "ERROR: ?broker= override parser leaked into production bundle"
            exit 1
          fi
          echo "OK: production bundle does not parse ?broker="

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type "workflow") so the first deploy doesn't fail
          # if Pages hasn't been turned on in repo settings yet.
          enablement: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
